# Terracotta · 赤土
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf
# (Omarchy sources it via ~/.config/omarchy/current/theme/hyprland.conf).
#
# Shipping this file makes Omarchy skip its generated border, so the colors are
# mirrored here — keep these in sync with colors.toml (clay_lt + sienna).

# Active window border: clay_lt → sienna gradient at 45°.
$activeBorderColor = rgb(f0c8a0) rgb(e2885f) 45deg

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    # Rounded window corners (0 = square). Personal preference — edit or delete.
    rounding = 8
}
